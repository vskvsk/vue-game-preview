<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoonGame - 云游戏平台</title>
  <meta name="description" content="MoonGame云游戏平台 - 无需下载，即点即玩，畅享云端游戏体验">
  
  <!-- Favicon - 使用内联SVG作为favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300d4ff'/%3E%3Cstop offset='100%25' stop-color='%237b2cbf'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M24 4L6 14v20l18 10 18-10V14L24 4z' fill='url(%23g)'/%3E%3Cpolygon points='20,18 20,30 30,24' fill='%23fff'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  
  <!-- 主题色 -->
  <meta name="theme-color" content="#0a0a0f">
  
  <!-- 预加载字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #fff;
      overflow-x: hidden;
    }
    
    /* 页面加载动画 */
    .page-loader {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s, visibility 0.5s;
    }
    
    .page-loader.hidden {
      opacity: 0;
      visibility: hidden;
    }
    
    .loader-logo {
      width: 80px;
      height: 80px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    
    /* 滚动条样式 */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }
    
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    /* 选择文本样式 */
    ::selection {
      background: rgba(0, 212, 255, 0.3);
      color: #fff;
    }
  </style>
</head>
<body>
  <!-- 页面加载动画 -->
  <div class="page-loader" id="pageLoader">
    <svg class="loader-logo" viewBox="0 0 48 48" fill="none">
      <defs>
        <linearGradient id="loaderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#00d4ff"/>
          <stop offset="100%" stop-color="#7b2cbf"/>
        </linearGradient>
      </defs>
      <path d="M24 4L6 14v20l18 10 18-10V14L24 4z" fill="url(#loaderGrad)"/>
      <polygon points="20,18 20,30 30,24" fill="#fff"/>
    </svg>
  </div>
  
  <div id="app"></div>
  
  <!-- Moonlight error.js 模块加载时需要此元素 -->
  <div id="error-list" style="position:fixed;top:16px;right:16px;z-index:9999;pointer-events:none;"></div>
  
  <script type="module" src="/src/main.js"></script>
  
  <script>
    // 页面加载完成后隐藏加载动画
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('pageLoader');
        if (loader) {
          loader.classList.add('hidden');
          setTimeout(() => loader.remove(), 500);
        }
      }, 800);
    });
  </script>
</body>
</html>
